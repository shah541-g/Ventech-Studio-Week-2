<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="index.css" />
    <title>Dashboard</title>
  </head>
  <body>
    <header class="header">
      <div class="menu-img-wrapper">
        <img src="./assets/menu.svg" alt="" class="menu-icon" />
      </div>
      <h2>Dashboard</h2>
      <div class="search-wrapper">
        <input type="search" name="" id="" placeholder="Search..." />
        <div class="search-img-wrapper">
          <img src="" alt="" class="search-icon" />
        </div>
      </div>
      <div class="bell-icon">
        <div class="bell-img-wrapper">
          <img src="./assets/notification.svg" alt="" class="bell-img" />
        </div>
        <p class="notification-count">3</p>
      </div>
      <div class="profile-details-section">
        <div class="profile-img-wrapper">
          <img src="" alt="" class="profile-img" />
        </div>
        <div>
          <p class="user-name"></p>
          <span class="user-role"></span>
        </div>
        <button class="chevlon-btn">
          <img src="./assets/open-me.svg" alt="" />
        </button>
      </div>
    </header>
    <main>
      <aside class="sidebar open">
        <header class="sidebar-header">
          <div class="logo-wrapper">
            <img src="./assets/dashboard.svg" alt="" class="logo" />
          </div>
          <h2 class="logo-heading">ApexDashboard</h2>
        </header>
        <main class="side-main">
          <div class="sidebar-option-wrapper">
            <div class="sidebar-option-img-wrapper">
              <img
                src="./assets/dashboard.svg"
                alt=""
                class="sidebar-option-img"
              />
            </div>
            <h3 class="sidebar-option">Dashboard</h3>
          </div>
          <div class="sidebar-option-wrapper">
            <div class="sidebar-option-img-wrapper">
              <img
                src="./assets/analytics.svg"
                alt=""
                class="sidebar-option-img"
              />
            </div>
            <h3 class="sidebar-option">Analytics</h3>
          </div>
          <div class="sidebar-option-wrapper">
            <div class="sidebar-option-img-wrapper">
              <img src="./assets/users.svg" alt="" class="sidebar-option-img" />
            </div>
            <h3 class="sidebar-option">Users</h3>
          </div>
          <div class="sidebar-option-wrapper">
            <div class="sidebar-option-img-wrapper">
              <img
                src="./assets/products.svg"
                alt=""
                class="sidebar-option-img"
              />
            </div>
            <h3 class="sidebar-option">Products</h3>
          </div>
          <div class="sidebar-option-wrapper">
            <div class="sidebar-option-img-wrapper">
              <img
                src="./assets/orders.svg"
                alt=""
                class="sidebar-option-img"
              />
            </div>
            <h3 class="sidebar-option">Orders</h3>
          </div>
          <div class="sidebar-option-wrapper">
            <div class="sidebar-option-img-wrapper">
              <img
                src="./assets/reports.svg"
                alt=""
                class="sidebar-option-img"
              />
            </div>
            <h3 class="sidebar-option">Reports</h3>
          </div>
          <div class="sidebar-option-wrapper">
            <div class="sidebar-option-img-wrapper">
              <img
                src="./assets/messages.svg"
                alt=""
                class="sidebar-option-img"
              />
            </div>
            <h3 class="sidebar-option">Messages</h3>
          </div>
          <div class="sidebar-option-wrapper">
            <div class="sidebar-option-img-wrapper">
              <img
                src="./assets/calendar.svg"
                alt=""
                class="sidebar-option-img"
              />
            </div>
            <h3 class="sidebar-option">Calendar</h3>
          </div>
          <div class="sidebar-option-wrapper">
            <div class="sidebar-option-img-wrapper">
              <img
                src="./assets/settings.svg"
                alt=""
                class="sidebar-option-img"
              />
            </div>
            <h3 class="sidebar-option">Settings</h3>
          </div>
          <div class="search-wrapper open">
            <input type="search" name="" id="" class="search-input" placeholder="    Search..." />
            <div class="search-img-wrapper">
              <img src="./assets/search.svg" alt="" class="search-icon" />
            </div>
          </div>
        </main>
        <hr class="sidebar-separator" />
        <footer class="side-footer">
          <div class="upgrade-wrapper">
            <div class="upg-img-wrapper">
              <img src="./assets/pro.svg" alt="" class="pro-img" />
            </div>
            <h5 class="upgrade-heading">Upgrade to Pro</h5>
          </div>
          <p class="upgrade-detail">
            Unlock all features and get premium support
          </p>
          <button class="upgrade-btn">Upgrade Now</button>
        </footer>
      </aside>
      <article></article>
    </main>
    <footer></footer>
  </body>
</html>
