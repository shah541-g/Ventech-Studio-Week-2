<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="index.css" />

    <title>Frontend Mentor | Product preview card component</title>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <div class="image-wrapper">
          <img class="mobile-img" src="./images/image-product-mobile.jpg" alt="">
          <img class="desktop-img" src="" alt="" />
        </div>
        <div class="flex-column">
          <div class="detail-section">
          <p class="product-type">Perfume</p>
          <h2 class="product-name">Gabrielle Essence Eau De Parfum</h2>
          <p class="product-description">
            A floral, solar and voluptuous interpretation composed by Olivier
            Polge, Perfumer-Creator for the House of CHANEL.
          </p>
          </div>
          <div class="buy-section">
          <div class="price-section">
            <h2 class="product-actual-price">$149.99</h2>
            <span class="product-deprecated-price"> $169.99 </span>
          </div>
          <button class="add-to-cart-btn">
            <img src="images/icon-cart.svg" alt="" /> Add to Cart
          </button>
          </div>
        </div>
      </div>
    </div>

    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Syed Abdul Ali Shah</a>.
    </footer>
  </body>
</html>
