<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pricing Cards Practice</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <article class="container">
    <header>
      <h1>Our Pricing</h1>
      <div class="checkboxes-wrapper">
        <input class="bullet-checkbox" type="checkbox" name="" id="">
        <label for="">Anually</label>
        <input class="bullet-checkbox" type="checkbox" name="" id="">
        <label for="">Monthly</label>
      </div>
    </header>
    <main>
      <article class="card">
        <h2>Basic</h2>
        <h1 class="price-heading">$19.99</h1>
        <section class="plan-details">
          <hr class="seperator">
          <p>500 GB Storage</p>
          <hr class="seperator">
          <p>2 Users Allowed</p>
          <hr class="seperator">
          <p>Send up to 3 GB</p>
        </section>
        <div class="button-wrapper">
          <button class="button-learn-more">Learn more</button>
        </div>
      </article>
      <article class="card active-card">
        <h2>Professional</h2>
        <h1 class="price-heading">$24.99</h1>
        <section class="plan-details">
          <hr class="seperator">
          <p>1 TB Storage</p>
          <hr class="seperator">
          <p>5 Users Allowed</p>
          <hr class="seperator">
          <p>Send up to 10 GB</p>
        </section>
        <div class="button-wrapper">
          <button class="button-learn-more active-btn">Learn more</button>
        </div>
      </article>
      <article class="card active">
        <h2>Master</h2>
        <h1 class="price-heading">$39.99</h1>
        <section class="plan-details">
          <hr class="seperator">
          <p>2 TB Storage</p>
          <hr class="seperator">
          <p>10 Users Allowed</p>
          <hr class="seperator">
          <p>Send up to 20 GB</p>
        </section>
        <div class="button-wrapper">
          <button class="button-learn-more">Learn more</button>
        </div>
      </article>
      
    </main>
  </article>
</body>
</html>
